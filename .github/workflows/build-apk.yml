name: Build & Release APK

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Create .env from GitHub Secrets
        run: |
          printf 'SUPABASE_URL=%s\nSUPABASE_ANON_KEY=%s\n' "${{ secrets.SUPABASE_URL }}" "${{ secrets.SUPABASE_ANON_KEY }}" > .env
          echo "--- .env contents (keys only) ---"
          grep -oP '^[^=]+' .env
          echo "--- file size ---"
          wc -c .env

      - name: Build release APK
        run: flutter build apk --release

      - name: Rename APK for clarity
        run: mv build/app/outputs/flutter-apk/app-release.apk app-release.apk

      - name: Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          files: app-release.apk
          prerelease: false
